services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-bookworm
    container_name: fusiondb-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: fusiondb
      POSTGRES_USER: fusiondb
      POSTGRES_PASSWORD: fusiondb_dev_password

    ports:
      - "5432:5432"

    volumes:
      - fusiondb_postgres_data:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fusiondb -d fusiondb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fusiondb_postgres_data: